  text: 太上洞玄靈寶出家因緣經道言昔開皇元年七月十五日午時於赤明國朱陽上觀三明寶壇詣太上天尊受无上三洞大乘妙經一萬三千五百篇符圖七千章已天尊將歸太空無爲之境時會有二百國王及以妃后并諸大臣國民男女同發道意稽首天尊捨棄國城妻子求欲出家誓願受持三洞經典終身供養作當來三世福業天尊含笑放九色寶光照此大會及諸王等國人男女內外明徹如琉璃珠臟腑毛髮莫不皆見是諸王等於其光內自見已身表裏洞朗悉知宿命過去未來三世善惡皎在目前是諸王等及以男女一切會人咸皆震懼更發無上最勝之心匍匐禮拜上白天尊言弟子宿因運會得遇慈尊無上勝會復値太上奉受三洞大法更逢經典昭示昔緣實非凡夫千載慶幸特由天尊宏慈之澤欲以開度曲逮之恩頓集今日蟲蟻微物豈覺深仁然喁喁之誠實欲捨棄穢土及以妻子願得出家持奉經戒作出世福田恩惟天尊特垂開許天尊曰汝未發心吾已知之所以放此光者將欲示汝宿命令識善惡因緣夫出家者因緣甚重汝能發意是不可思議但恐汝等耽染世事放蕩已久不能甘苦受此勤勞有始無終初勤後怠匪專守道終落惡門輕師慢法自取沉淪是諸王等一時頓顙稽首叩頭聲淚俱下遂作誓言弟子等若出家後有始無終初勤後怠違其本誓中道退惰卽與九祖父母同淪地獄萬刼難原後報受生非人之類不敢有言天尊曰汝各諦聽吾今爲汝說出家因緣夫出家者或先世建立靈觀玄壇及諸精舍聖眞仙迹廣修堂殿造諸形像眞應化身莊嚴供養抄經講說誦念流通開悟人天或先世捨施國城妻子頭目髓腦金銀珠玉綾羅錦綺車馬僮僕卧具服飾玩弄器物入三寶中用作諸福田或先世持齋奉戒禮拜燒香行道讃誦謝罪除愆常行善願不捨須臾或先世放贖生命救濟貧窮囚徒老病及諸鳥獸盲聾六疾一切眾生或先世救疾治病活諸危苦已死之人或先世廣讀經論講說教化勸奬童䝉令知善道或先世種植果林道邊立井造作舟梁濟度一切或先世大設義田施衣及食饑寒病苦蟲魚鳥獸一切貧窮皆令飽足或先世建立義堂愍念寒𤍠施漿及火救助行旅使得安居或先世所在發心平等一相廣化男女勸助道場立觀度人寫經鑄像授經傳戒禮拜燒香然燈念誦布施懴悔開悟羣迷或先世忠貞仁孝助國興化正直淸廉湻和良善不損於物安樂眾生或先世爲君大行慈善卑宫菲食憐念人民平等萬物國土安寧而諸惡未盡眾善未圓功名雖著不得遷昇隨其高下來生人中更値經法而得出家或七祖積福慶流子孫或見世立功名聞諸天非起一朝而得之也汝等先世信向三寶寫經造像建立玄壇度人濟物持齋禮拜念誦燒香供養行道布施懴悔願念不絕大作功德致令國王之報人中第一是不可思議更能捨國城妻子棄世歡樂求乞出家持奉經誡發無上心作當來過去長生道業甚爲希有不可思議不可思議是諸王等一時稽首五體投地悲喜不寧天尊於是卽命九地眞官敷延眞之座四天帝王列度仙之錄三天眞王下證眞之信五帝持幢三界執符四司齎簡三官案簿諸天帝君仙童玉女神仙兵馬巨億萬眾一時來下散花燒香揚旛振旌鏗鐘叩磬天樂萬種羅列左右同聲稱善俱到道場監臨法會開度善緣天尊命我與玉淸高聖授諸王等入道科誡節度威儀四天王等爲加法服北面禮天尊三拜回禮吾及諸天仙眞聖等東面伏地受初眞誡也誡曰出家之後第一不得輕慢經道及以本師第二不得泄慢法服損道威儀第三不得中道退敗趨世榮華第四不得捨我法衣更從異學第五不得與非出家及諸異學交遊居處穢辱法服第六不得啖食酒肉懷殺害想第七不得與諸男女交遊生婬邪想第八不得違犯經誡生諸過惡第九不得傲誕狼戾欺凌同道及非出家人第十不得不敬父母國君不忠不孝一當常發大心立觀度人寫經造像紹隆聖教二當常發大心講說三洞經教勸化眾生令廣悟解三當常發大心持齋禮拜奉誡燒香作過去未來生死道果四當常發大心爲國主人王大臣宰輔天下人民作大功德五當常發大心爲九玄七祖所生父母眷屬妻子一切眾生作厯刼福田六當常發大心遍爲天下地上有識無識有緣無緣若人非人一切含識讀經禮拜念道念師皆令離苦同昇道岸七當常發大心願一切眾生皆悟正道永免生死八當常發大心願前刼後刼今身生身大道興隆永無淪壞開度眾生是諸王等各禮三拜又回心禮十方各一拜因對天尊自發誓願第一誓者出家之後誓不輕慢經道及以本師第二誓者出家之後誓不泄慢法服損道威儀第三誓者出家之後誓不中道退敗趨世榮華第四誓者出家之後誓不捨其法服更從異學第五誓者出家之後誓不與非出家及諸異學交遊居處穢辱法服第六誓者出家之後誓不啖食酒肉懷殺害想第七誓者出家之後誓不與諸男女交遊生婬慾想第八誓者出家之後誓不違經誡生諸過惡第九誓者出家之後誓不傲誕狠戾欺凌同學及非出家人第十誓者出家之後誓不敢不敬父母國君不忠不孝一願立觀度人寫經造像紹隆三寶二願講說三洞經教令廣開悟解三願持齋禮拜奉誡燒香旦夕不替四願爲國主人王大臣宰輔天下人民作諸功德五願爲九玄七祖所生父母眷屬因緣作厯刼福田六願遍爲天下地上一切眾生讀經禮拜令登道岸七願一切眾生皆悟正道八願前刼後刼常在道門心不退轉九願十方世界一切男女有道心者同得出家十願刼刼種因早得仙道永無生滅發此誓願已是諸大眾一時稱善各住本位於是諸天仙眞聖眾玉童玉女建節持幢散花燒香歌詠天尊無量功德奏天音樂引諸王等新出家者行道三帀十聲稱善歎願畢己逕就福堂飲食天供持齋淸淨諸天男女及以國人下萬種花果珍奇法味次第周行供養訖已將諸府庫七寶珠玉綾羅錦綺衣服卧具玩弄器物香爐几拂如意履杖食器坐褥繩牀夾膝旛幢澡鑵巾帕皂筴僮僕車馬園宅苑囿竹樹果林花藥池沼種種法物捨施供養新出家者及諸會人同發聲言我等宿幸得逢今日天尊慈悲大弘度脫有是王等棄國出家而爲我等作大福利開盲愚心得見眞道唯願王等堅持法相住大法門行天尊教開度我等使我滅罪生無量善當來世中得出家法身說是願己三聲稱善瞻仰天尊稽首而坐天尊曰汝等男女無量刼來持奉齋戒供養禮拜得遇今日不可思議更當布施新出家者及諸眾會功德無量天人歡欣必當閉眼卽生富貴國王之門聰明賢達還得出家定不差也是諸男女同聲稱善一時禮拜依位而坐天尊曰出家者有三種義一曰出家二曰入道三曰捨凡何謂出家家有二義一者恩愛之家謂父母恩愛兄弟恩愛姊妹恩愛男女恩愛眷屬恩愛共相纒縛繫戀在心造諸惡業種種貪著令生煩惱不得自在修正眞道今出此家永斷恩愛常得自在念道無爲二者諸有之家謂我此身五陰四大聚集相成處在世間妄生染著六根三業廣搆諸塵世境攀緣造眾惡業色聲香味煩惱淨心弊穢旣生輪廻生死不能解脫永劫沉淪世世生生受非人類今知身非身不淨臭穢膿血聚合暫寄少時一旦化消百骸無主譬諸泡幻聚散須臾萬法參差同一虛假總非我有與我自殊妄繫有無而生染著穢累識神遂幽地獄今出此家永斷煩惱觀身空假諸境洞然運想舉心皆歸至道體神入妙鍊質歸無不死不生永證常樂故曰出家何謂入道道有二種一者道境謂玄壇靈觀山林靖治樹下花園淸淨無爲不交凡世身登此地面對眞容口誦靈文無諸囂雜燒香禮拜行道誦經講說大乘專精守一棄彼俗境入此道場陶鍊心形必至常樂克成眞聖證果玉淸無去無來湛然常住二者道體謂端身靜慮觀想內身省察已形遠觀諸物同爲有待俱是空無黯爾蹔生倐然俄化卽生卽滅歘有歘無萬法不停一生非久熟看世界念念無常好體我身誰爲眞者當知假合旣備因緣聚散須臾豈能常住當須存三守一鍊質成眞長與道同免其生死常樂我淨證果道場轉此漏身名爲入道何謂捨凡凡有二種一者凡境謂天地日月山河石壁草木蟲魚一切眾生皆是有物暫生暫滅卽破卽壞消散少時不肯耽著染穢我身當知三界悉爲空假並能捨棄永絕貪求二者凡身謂我此身眼耳鼻口身肉皮膚手足毛髮百骸九竅總相聚合名之爲人究竟尋求人無有處生老病死念念無常不淨臭穢暫時依倚何須執著而有是非彼我殺生偷盗邪淫放蕩嫉妬慳貪罵詈嗔怒綺言妄語兩舌惡口嗊嗃欺凌富貴貧窮更相侵取愛憎取捨種種攀緣流浪色聲貪著香味常聚金寶玉帛綾羅繒綺米麥穀粟積歛無厭將充萬世豈知一旦形化灰塵今捨我身息諸貪著眼斷諸色耳斷諸聲鼻斷諸香口斷諸味意斷諸法身斷諸欲乃至六根六識六欲六賊六入六染六塵更相因起三十六緣諸惡根本並皆棄捨澄淨一心永斷煩惱故曰捨凡總此三者名爲道士所以名爲道士者謂行住坐卧舉心運意唯道爲務持齋禮拜奉誡誦經燒香散花然燈懴悔布施願念講說大乘教導眾生發大道心造諸功德普爲一切後已先人不雜塵勞唯行道業士者事也事有多少學致差殊凡有七階俱稱道士一者天眞謂體合自然內外湻淨二者神仙謂變化不測超離凡界三者幽逸謂含光藏輝不拘世累四者山居謂幽潛默遁仁者自安五者出家謂捨諸有愛脫落囂塵六者在家謂和光同塵抱道懷德七者祭酒謂屈已下凡救度危苦故得天下地上六道四生禮拜歸敬最爲尊勝不朝天子不揖公侯作人天福業受三界供養所以者何由稟我法教依我法服持奉經誡開導眾生令過去未來三世永脫憂苦入常樂門是諸人天法身父母故也帝王者雖富有萬國貴爲人尊而不免生死不免疾病不免煩惱不免破壞不免寒暑不免往反能若道士脫其患矣若出家不依我法不持法衣或背道入俗棄眞就僞或從異學邪道崇奉外教或趨世榮華苟貪名利或王法逼迫官私枉橫脫其衣服損辱法身或自捨法服郤沉凡界或人不信敬罵詈凌辱打棓出家法身或生輕慢心不恭肅或戯弄調笑嗊嗃傲誕如此之人見世必遭蟲癩之病眉毛墮落遍身瘡腫舉體爛壞人不喜見或遭官司牢獄杻械枷鎻痛楚切身或盲聾瘖啞手攣脚跛形容醜陋貧窮下賤或風狂顚癎邪神惡鬼𡨚家凶對以相報値病苦加身或毒蛇猛獸水火刀兵凶人刼賊非意損害或所生男女形容醜陋貧窮下賤常不具足或長病在身求生不得求死不得常居牀枕或生落邊夷更相殺伐旦夕驚恐父子分離一旦身死逕入地獄吞火食炭足履刀山手攀劍樹身負鐵杖鑊湯煮漬碓擣磑磨寒氷逼體萬痛切身晝夜考掠辛苦備經動則萬刼後得受生還爲六畜貧窮下賤盲聾六疾種種苦惱切割其身若出家之後心生退轉輕慢法服違犯經誡飲食酒肉殺生偷盜邪淫放蕩不持法相損污道門亦復如是時諸眾等同聲稱善禮拜天尊而說頌曰善哉無上尊慈悲普救護授與太上經
