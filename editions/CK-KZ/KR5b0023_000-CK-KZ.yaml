body:
  text: 諸王得開悟因兹同發願投誠永傾慕捨國求出家隨緣總開度受誡說誓願人天感丹愫廣演因緣法並入歸依路永作生死果萬劫常流布我等諸會人同歡飲甘露若四時失度陰陽不調當須立觀度人若水火刀兵天下損傷當須立觀度人若疫毒流行人民死亡當須立觀度人若國主有災厄運相逢當須立觀度人若國祚將危兵革四興當須立觀度人若初登王位化治人民當須立觀度人若統領天下國土不安當須立觀度人若誕育男女疾病厄難當須立觀度人凡有災厄及諸變異一切危苦當須立觀度人或爲父母或爲己身或爲妻子或爲臣民或爲祖世或爲見存或爲終亡或爲三塗皆當立觀度人夫立觀度人上消天災安鎭國祚保護帝王消禳毒害開度人民生死獲慶其福巍巍普今一切使有歸依功德無量不可思議道言夫出家者作生死福田受人天勝報常當禮拜供養給其所須衣服卧具玩弄器物香油几杖車輿僕從殿堂屋宇臺榭樓閣花林藥圃浴池果園飲食滋味珍寶繒綵旛花燈燭鐘磬法具香爐澡鑵如意麈拂隨其所有以用布施供養出家法身令得安樂開發智慧轉讀尊經禮拜燒香持齋奉誡建百寶座講說大乘常爲國主人王大臣宰輔人民男女一切眾生作三世福田帝主國王大臣宰輔及以人庶生不信心駡詈咒詛訶責凌辱禁閉枷鎻損壞法身或致傷殺鞭笞考楚使其辛苦汙辱法服逼令入俗見世蟲癩眾厄備經過去魂神逕入地獄受諸苦惱萬刼不原若出家之人自受凌辱不持法相生憎慢心令諸眾生起不信者過去當作猪狗蛇虺之身汝等男女愼之愼之道言汝諸男女甯剝五百人衣不得脫一出家法衣甯害一切惡人不得害一出家法身甯犯三千猛獸不得犯一出家甯辱五千力士不得辱一出家甯輕欺一萬惡鬼不得輕欺一出家甯坐大火之中不得與出家同席甯卧𤍠鐵之牀不得共出家同寢甯觸五萬毒蛇不得觸出家法衣甯吹大山爲塵不得道說出家甯吞萬斛猛火不得食出家人物甯没萬丈穢中不得淫犯出家甯出百千人身血不得見出家是非所以者何出家是天尊弟子紹隆經教故出家是一切人天無上法師故出家是一切眾生生死橋梁故出家是一切人民歸依父母故出家是國主人王修善因緣故出家是九玄七祖拔度功力故出家是諸仙眞聖發生初心故出家是三塗五苦彼岸法舟故受國主人王父母眷屬禮信供養諸天魔王三界鬼神稽首束形自稱下官受教出家法門何以故爲受天尊遺教行天尊經法誦天尊法言佩天尊誡籙持天尊符圖常有三界五帝將軍吏兵守衞迎送犯之者獲罪若帝主國王大臣宰輔人民男女能發善心出家入道者九祖父母得上天宫七世子孫不入地獄若道士廣勸有緣令出家者一人益算一千五百三人已上名登仙格見世歡樂衣食自然過去生天福報無窮道言汝諸男女旣出家已當須護持法服尊師念道持奉經誡勤修行業禮拜燒香長齋奉誡誦經行道講說大乘廣建功德更相開度化喻眾生紹隆法教常行慈悲救濟一切精研上道轉神入妙在在長存念念增進永不退墮克得道眞道言汝等男女皆從無量劫來捨身受身行諸善道持奉齋戒今得出家須知宿命生身因緣夫人承昔功業資道之力得生人中寄胎父母和合善緣兩半成身法天象地具足六根稟受元氣生化百神運動陰陽遍滿身形眼耳鼻口骨節皮膚臟腑血脉內外相連結聚眞氣榮衞五神致得堅固內本一源日月流照生化百神三元八景轉變無窮內外相合三萬六千從初至終次第有倫今爲汝說須識之焉人始受胎因緣道一天地陰陽各以一半未身之前寄父母胎九天構氣三元布神一月爲胞胞者包也元氣包裹結聚混黃運轉生化中有眞精二月爲胎胎者恢也神乘宿命來降父母身中構造陰陽恢廓其形三月爲魂魂者云也陽之粹精薄而生神云云不住運轉經營四月爲魄魄者泊也陰之湻氣凝神鎭形泊然安靜以定厥身五月爲臟臟者藏也陰陽有象五行列分置立五臟肝心脾肺腎以藏五神攝御萬靈生化一身六月爲腑腑者聚也積聚津液漑灌五神大小腸冑膽焦膀胱消息穀津百體成焉七月爲竅竅者通也出入視聽內外開明八月爲景景者警也三部八景警備人身九月神具天地日月星辰五行四時生化一切神明內外相合出入身中上下三部環繞三宫萬有八千表裏影照一時生身金堂玉室十二重樓紫戸玉閣日月星辰五嶽四瀆象地法天宛轉備具遍滿其身十月天地神祇五帝四司九天司馬十方善神仙童玉女一時監臨太一衞軒玄母守房感天動地眾聖齊歡司命注籍天帝定年隨其宿業受報不差保形守神澄心自然變鍊滓滯重修善功以道通神以德育形形神合契歸於虛无不生不死常住獨存人須保養形神愼勿損焉汝道士當須保守形神愛養精氣不損毛髮不損皮膚内全精神外具身形首冠蓮花足履太山中披日月四象分明天地在體日月存身有道可法有德可尊萬物服從一切歸依故謂法服出家法身道言吾過去後上皇半刧當有邪學鬼道不從我教自作一法人民信向天下歸伏損形滅身多積財寶大造形像廣設屋宅妄稱聖果過去得福淫慾姦矯惑亂人心漸漸滋蔓男女敬信永不開悟國破家亡身滅族散繼踵相仍舉世沉迷終無覺察當此之時我法大壞人不肯行唯崇鬼法寂滅之教長生久視而不信用痛哉痛哉道士無知亦復奉也一習此法永無仙分長生之冀可不愼哉何以故爲是陰教鬼道死滅之法喻如五穀朽壞有生相不亦如腐壞能生物不亦如死灰更有然不復如枯木得重榮不消散朽壞化爲糞土此爲寂滅不生法也世以生爲善事死是惡事皆欲其生悉悲其死故我爲說長生之法令其不死永劫長存但爲眾生顚倒不能信奉致有死壞而乃求學死滅之法豈不誤哉且死者豈復須學矣故仙道貴全身鬼道貴滅形仙道貴光明鬼道貴幽冥仙道貴長存鬼道貴消亡仙道貴淸虛鬼道貴濁辱仙道貴保安鬼道貴浮危仙道貴有身鬼道貴無形有道者長生無爲鍊神入妙歸於大道形神合契常存不亡是也無身者死滅灰塵形朽神逝沉淪九夜冥冥幽暗是也汝等道士宜志之焉吾故預記令有心者識矣道言吾過去後有諸道士身披法服形似出家而心實凶惡飲食酒肉殺生偷盗邪淫顚倒種種過惡悉能行之專學小道貪求名利攻根伐本背正入邪不信神仙長生眞法而求邪學死滅道者千千萬萬吾當遣五天魔王次第誅之道言有諸道士及以男女持經奉戒禮拜燒香布施救貧造諸靈觀抄經鑄像講說開導接引有心吞津咽液存三守一灰心滅想志求眞仙不死之法專誠無退者吾遣諸天靈官九地主司教其大法更受眞經神丹靈藥仙芝玉英延年變化鍊質易神常存之道隨其學業召入仙宫五嶽洞天漸致通靈轉神入妙飛騰諸天此之學者世亦難量仙道隱宻人不知矣是諸王等及以眷屬仙眞聖眾一時稱善稽首而退
