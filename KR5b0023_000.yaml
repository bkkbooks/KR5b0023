body:
  text: 太上洞玄靈寶出家因緣經字三道言昔開皇元年七月十五日午時於赤明國朱陽上觀三明寶壇詣太上天尊受無上三洞大乘妙經一萬三千五百篇符圖七千章巳天尊將歸太空無為之境時㑹有二百國王及以妃后并諸大臣國民男女同發道意稽首天尊捨棄國城妻子求欲出家誓願受持三洞經典終身供養作當來三世福業天尊含笑放九色寶光照此大㑹及諸王等國人男女內外明徹如琉璃珠臟腑毛髮莫不皆見是諸王等於某光內自見己身表裏洞朗悉知宿命過去未來三世善惡皎在目前是諸王等及以男女一切㑹人咸皆震懼更發無上最勝之心匍匐禮拜上白天尊言弟子宿因運㑹得遇慈尊無上勝㑹復值太上奉受三洞大法更逢經典昭示昔緣實非凡夫千載慶幸特由天尊弘慈之澤欲以開度曲逮之恩頓集今日蟲蟻微物豈覺深仁然喁喁之誠實欲捨棄穢土及以妻子願得出家持奉經戒作出世福田恩惟天尊特垂開許天尊曰汝未發心吾巳知之所以放此光者將欲示汝宿命令識善惡因緣夫出家者因緣甚重汝能發意是不可思議但恐汝等耽染世事放蕩巳久不能甘苦受此勤勞有始無終初勤後怠匪專守道終落惡門輕師慢法自取沉淪是諸王等一時頓顙稽首叩頭聲淚俱下遂作誓言弟子等若出家後有始無終初勤後怠違其本誓中道退惰即與九祖父母同淪地獄萬劫難原後報受生非人之類不敢有言天尊曰汝各諦聽吾今為汝說出家因緣夫出家者或先世建立靈觀玄壇及諸精舍聖真仙迹廣修堂殿造諸形像真應化身莊嚴供養抄經講說誦念流通開悟人天或先世捨施國城妻子頭目髓腦金銀珠玉綾羅錦綺車馬僮僕卧具服飾玩弄器物入三寶中用作諸福田或先世持齊奉戒禮拜燒香行道讃誦謝罪除愆常行善願不捨須㬰或先世放贖生命救濟貧窮囚徒老病及諸鳥獸盲聾六疾一切衆生或先世救疾治病活諸危苦巳死之人或先世廣讀經論講說教化勸奬童蒙令知善道或先世種植果林道邊立井造作舟梁濟度一切或先世大設義田施衣及食饑寒病苦蟲魚鳥獸一切貧窮皆令飽足或先世建立義堂愍念寒熱施槳及火救助行旅使得安居或先世所在發心平等一相廣化男女勸助道場立觀度人寫經鑄像授經傳戒禮拜燒香然燈念誦布施懴悔開悟羣迷或先世忠貞仁孝助國興化正直清廉淳和良善不損於物安樂衆生或先世為君大行慈善卑宫菲食憐念人民平等萬物國土安寧而諸惡未盡衆善未圎功名雖著不得遷升隨其髙下來生人中更值經法而得出家或七祖積福慶流子孫或見世立功名聞諸天非起一朝而得之也汝等先世信向三寶寫經造像建立玄壇度人濟物持齊禮拜念誦燒香供養行道布施懴悔願念不絶大作功德致令國王之報人中第一是不可思議更能捨國城妻子棄世歡樂求乞出家特奉經誡發無上心作當來過去長生道業甚為希有不可思議不可思議是諸王等一時稽首五體投地悲喜不寧天尊於是即命九地真官敷延真之座四天帝王列度仙之録三天真王下證真之信五帝持幢三界執符四司齎簡三官案簿諸天帝君仙童玉女神仙兵馬巨億萬衆一時來下散花燒香揚幡振旌鏗鍾叩磬天樂萬種羅列左右同聲稱善俱到道場監臨法㑹開度善緣天尊命我與玉清髙聖授諸王等入道科誡節度威儀四天王等為加法服北面禮天尊三拜回禮吾及諸天仙真聖等東面伏地受初真誡也誡曰出家之後第一不得輕慢經道及以本師第二不得泄慢法服損道威儀第三不得中道退敗趨世榮華第四不得捨我法衣更從異學第五不得與非出家及諸異學交遊居處穢辱法服第六不得啖食酒肉懷殺害想第七不得與諸男女交遊生淫邪想第八不得違犯經誡生諸過惡第九不得傲誕狠戾欺凌同道及非出家人第十不得不敬父母國君不忠不孝一當常發大心立觀度人寫經造像紹隆聖教二當常發大心講說三洞經教勸化衆生令廣悟解三當常發大心持齊禮拜奉誡燒香作過去未來生死道果四當常發大心為國主人王大臣宰輔天下人民作大功德五當常發大心為九玄七祖所生父母眷屬妻子一切衆生作歷劫福田六當常發大心遍為天下地上有識無識有緣無緣若人非人一切含識讀經禮拜念道念師皆令離苦同升道岸七當常發大心願一切衆生皆悟正道永免生死八當常發大心願前劫後劫令身生身大道興隆永無淪壞開度衆生是諸王等各禮三拜又回心禮十方各一拜因對天尊自發誓願第一誓者出家之後誓不輕慢經道及以本師第二誓者出家之後誓不泄慢法服損道威儀第三誓者出家之後誓不中道退敗趨世榮華第四誓者出家之後誓不捨其法服更從異學第五誓者出家之後誓不與非出家及諸異學交遊居處穢辱法服第六誓者出家之後誓不啖食酒肉懷殺害想第七誓者出家之後誓不與諸男女交遊生淫欲想第八誓者出家之後誓不違經誡生諸過惡第九誓者出家之後誓不傲誕狠戾欺凌同學及非出家人第十誓者出家之後誓不敢不敬父母國君不忠不孝一願立觀度人寫經造像紹隆三寶二願講說三洞經教令廣開悟解三願持齊禮拜奉誡燒香旦夕不替四願為國主人王大臣宰輔天下人民作諸功德五願為九玄七祖所生父母眷屬因緣作歷劫福田六願遍為天下地上一切衆生讀經禮拜令登道岸七願一切衆生皆悟正道八願前劫後劫常在道門心不退轉九願十方世界一切男女有道心者同得出家十願劫劫種因早得仙道永無生滅發此誓願巳是諸大衆一時稱善各住本位於是諸天仙真聖衆玉童玉女建節持幢散花燒香歌詠天尊無量功德奏天音樂引諸王等新出家者行道三市十聲稱善歎願畢巳徑就福堂飲食天供持齊清淨諸天男女及以國人下萬種花果珍竒法味次第周行供養訖巳將諸府庫七寶珠玉綾羅錦綺衣服卧具玩弄器物香爐几拂如意覆杖食器坐褥繩牀夾膝幡幢澡罐巾帕匕策僮僕車馬園宅苑囿竹樹果林花藥池沼種種法物捨施供養新出家者及諸㑹人同發聲言我等宿幸得逢今日天尊慈悲大弘度脫有是王等棄國出家而為我等作大福利開盲愚心得見真道唯願王等堅持法相住大法門行天尊教開度我等使我滅罪生無量善當來世中得出家法身說是願巳三聲稱善瞻仰天尊稽首而坐天尊曰汝等男女無量劫來持奉齊戒供養禮拜得遇今日不可思議更當布施新出家者及諸衆㑹功德無量天人歡欣必當閉眼即生冨貴國王之門聰明賢逹還得出家定不差也是諸男女同聲稱善一時禮拜依位而坐天尊曰出家者有三種義一曰出家二曰入道三曰捨凡何謂出家家有二義一者恩愛之家謂父母恩愛兄弟恩愛姊妹恩愛男女恩愛眷屬恩愛共相纒縛繫戀在心造諸惡業種種貪著令生煩惱不得自在修正真道今出此家永斷恩愛常得自在念道無為二者諸有之家謂我此身五隂四大聚集相成處在世間妄生染著六根三業廣搆諸塵世境攀緣造衆惡業色聲香味煩惱淨心弊穢既生輪回生死不能解脫永劫沉淪世世生生受非人類今知身非身不淨臭穢膿血聚合暫寄少時一旦化消百骸無主譬諸泡幻聚散須㬰萬法參差同一虛假總非我有與我自殊妄繫有無而生染著穢纍識神遂幽地獄今出此家永斷煩惱觀身空假諸境洞然運想舉心皆歸至道體神入妙錬質歸無不死不生永證常樂故曰出家何謂入道道有二種一者道境謂玄壇靈觀山林靖治樹下花園清淨無為不交凡世身登此地面對真容口誦靈文無諸囂雜燒香禮拜行道誦經講說大乘專精守一棄彼俗境入此道場陶錬心形必至常樂克成真聖證果玉清無去無來湛然常住二者道體謂端身靜慮觀想內身省察已形逺觀諸物同為有待俱是空無黯爾暫生倐然俄化即滅歘有歘無萬法不停一生非久熟看世界念念無常好體我身誰為真者當知假合既備因緣聚散須㬰豈能常住當須存三守一錬質成真長與道同免其生死常樂我淨證果道場轉此漏身名為入道何謂捨凡凡有二種一者凡境謂天地日月山河石壁草木蟲魚一切衆生皆是有物暫生暫滅即破即壞消散少時不可耽著染穢我身當知三界悉為空假並能捨棄永絶貪求二者凡身謂我此身眼耳鼻口身肉皮膚手足毛髮百骸九竅總相聚合名之為人究竟尋求人無有處生老病死念念無常不淨臭穢暫時依倚何須執著而有是非彼我殺生偷盜邪淫放蕩嫉妬慳貪罵詈嗔怒綺言妄語兩舌惡口嗊嗃欺凌冨貴貧窮更相侵取愛憎取捨種種攀緣流浪色聲貪著香味常聚金寶玉帛綾羅繒綺米麥穀粟積斂無厭將充萬世豈知一旦形化灰塵今捨我身息諸貪著眼斷諸色耳斷諸聲鼻斷諸香口斷諸味意斷諸法身斷諸欲乃至六根六識六欲六賊六入六染六塵更相因起三十六緣諸惡根本並皆棄捨澄淨一心永斷煩惱故曰捨凡總此三者名為道士所以名為道士者謂行住坐卧舉心運意唯道為務持齊禮拜奉誡誦經燒香散花然燈懴悔布施願念講說大乘教導衆生發大道心造諸功德普為一切後已先人不雜塵勞唯行道業士者事也事有多少學致差殊凡有七階俱稱道士一者天真謂體合自然內外淳淨二者神仙謂變化不測超離凡界三者幽逸謂含光藏輝不拘世纍四者山居謂幽潜默遁仁者自安五者出家謂捨諸有愛脫落囂塵六者在家謂和光同塵抱道懷德七者祭酒謂屈已下凡救度危苦故得天下地上六道四生禮拜歸敬最為尊勝不朝天子不揖公侯作人天福業受三界供養所以者何由稟我法教衣我法服持奉經誡開導衆生令過去未來三世永脫憂苦入常樂門是諸人天法身父母故也帝王者雖冨有萬國貴為人尊而不免生死不免疾病不免煩惱不免破壞不免寒暑不免往反能若道士脫其患矣若出家不依我法不持法衣或背道入俗棄真就僞或從異學邪道崇奉外教或趨世榮華苟貪名利或王法逼迫官私枉橫脫其衣服損辱法身或自捨法服却沉凡界或人不信敬罵詈凌打棓出家法身或生輕慢心不恭肅或戲弄調笑嗊嗃傲誕如此之人見世必遭蟲癩之病眉毛墮落遍身瘡腫舉體爛壞人不喜見或遭官司牢獄杻械枷鎖痛楚切身或盲聾瘖啞手攣腳跛形容醜陋貧窮下賤或風狂顚癎邪神惡鬼𡨚家凶對以相報值病苦加身或毒蛇猛獸水火刀兵凶人劫賊非意損害或所生男女形容醜陋貧窮下賤常不具足或長病在身求生不得求死不得常居牀枕或生落邊夷更相殺伐旦夕驚恐父子分離一旦身死徑入地獄吞火食炭足履刀山手攀劒樹身負鐵杖鑊湯煮漬碓搗磑磨寒冰逼體萬痛切身晝夜考掠辛苦備經動則萬劫後得受生還為六畜貧窮下賤盲聾六疾種種苦惱切割其身若出家之後心生退轉輕慢法服違犯經誡飲食酒肉殺生偷盜邪淫放蕩不持法相損汙道門亦復如是時諸衆等同聲稱善禮拜天尊而說頌曰善哉無上尊慈悲普救護授與太上經諸王得開悟因兹同發願投誠永傾慕捨國求出家隨緣總開度受誡說誓願人天感丹愫廣演因緣法並入歸依路永作生死果萬劫常流布我等諸㑹人同歡飲甘露若四時失度隂陽不調當須立觀度人若水火刀兵天下損傷當須立觀度人若疫毒流行人民死亡當須立觀度人若國主有災厄運相逢當須立觀度人若國祚將危兵革四興當須立觀度人若初登王位化治人民當須立觀度人若統領天下國土不安當須立觀度人若誕育男女疾病厄難當須立觀度人凡有災厄及諸變異一切危苦當須立觀度人或為父母或為已身或為妻子或為臣民或為祖世或為見存或為終亡或為三塗皆當立觀度人夫立觀度人上消天災安鎮國祚保護帝王消禳毒害開度人民生死獲慶其福巍巍普今一切使有歸依功德無量不可思議道言夫出家者作生死福田受人天勝報常當禮拜供養給其所須衣服卧具玩弄器物香油几杖車輿僕從殿堂屋宇臺榭樓閣花林藥囿浴池果園飲食滋味珍寶繒綵幡花燈燭鍾磬法具香爐澡罐如意麈拂隨其所有以用布施供養出家法身令得安樂開發智慧轉讀尊經禮拜燒香持齊奉誡建百寶座講說大乘常為國主人王大臣宰輔人民男女一切衆生作三世福田帝主國王大臣宰輔及以人庶生不信心罵詈咒詛訶責凌辱禁閉枷鎖損壞法身或致傷殺鞭笞考楚使其辛苦汙辱法服逼今入俗見世蟲癩衆厄備經過去魂神徑入地獄受諸苦惱萬劫不原若出家之人自愛凌辱不持法相生憎慢心令諸衆生起不信者過去當作猪狗蛇虺之身汝等男女愼之愼之道言汝諸男女寧剝五百人衣不得脫一出家法衣寧害一切惡人不得害一出家法身寧犯三千猛獸不得犯一出家寧辱五千力士不得辱一出家寧輕欺一萬惡鬼不得輕欺一出家寧坐大火之中不得與出家同席寧卧熱鐵之牀不得共出家同寢寧觸五萬毒蛇不得觸出家法衣寧吹大山為塵不得道說出家寧吞萬斛猛火不得食出家人物寧沒萬丈穢中不得淫犯出家寧出百千人身血不得見出家是非所以者何出家是天尊弟子紹隆經教故出家是一切人天無上法師故出家是一切衆生生死橋梁故出家是一切人民歸依父母故出家是國主人王修善因緣故出家是九玄七祖拔度功力故出家是諸仙真聖發生初心故出家是三塗五苦彼岸法舟故受國主人王父母眷屬禮信供養諸天魔王三界鬼神稽首束形自稱下官受教出家法門何以故為受天尊遺教行天尊經法誦天尊法言佩天尊誡籙持天尊符圖常有三界五帝將軍吏兵守衛迎送犯之者獲罪若帝主國王大臣宰輔人民男女能發善心出家入道者九祖父母得上天宫七世子孫不入地獄若道士廣勸有緣今出家者一人益算一千五百三人巳上名登仙格見世歡樂衣食自然過去生天福報無窮道言汝諸男女既出家已當須護持法服尊師念道持奉經誡勤修行業禮拜燒香長齊奉戒誦經行道講說大乘廣建功德更相開度化喻衆生紹隆法教常行慈悲救濟一切精研上道轉神入妙在在長存念念增進永不退墮克得道真道言汝等男女皆從無量劫來捨身受身行諸善道持奉齊戒今得出家須知宿命生身因緣夫人承昔功業資道之力得生人中寄胎父母和合善緣兩半成身法天象地具足六根稟受元氣生化百神運動隂陽遍滿身形眼耳鼻口骨節皮膚臟腑血脉內外相連結聚真氣榮衛五神致得堅固內本一源日月流照生化百神三元八景轉變無窮內外相合三萬六千從初至終次第有倫今為汝說須識之焉人始受胎因緣道一天地隂陽各以一半未身之前寄父母胎九天構氣三元布神一月為胞胞者包也元氣包裹結聚混黃運轉生化中有真精二月為胎胎者恢也神乘宿命來降父母身中構造隂陽恢廓其形三月為魂魂者云也陽之粹精薄而生神云云不住運轉經營四月為魄魄者泊也隂之淳氣凝神鎮形泊然安靜以定厥身五月為臟臟者藏也隂陽有象五行列分置立五臟肝心脾肺腎以藏五神攝御萬靈生化一身六月為腑腑者聚也積聚淳液溉灌五神大小腸胃膽焦膀胱消息榖津百體成焉七月為竅竅者通也出入視聽內外開明八月為景景者警也三部八景警備人身九月神具天地日月星辰五行四時生化一切神明內外相合出入身中上下三部環繞三宫萬有八千表裏影照一時生身金堂玉室十二重樓紫戶玉閣日月星辰五嶽四瀆象地法天宛轉備具遍滿其身十月天地神祇五帝四司九天司馬十方善神仙童玉女一時監臨太一衛軒玄母守房感天動地衆聖齊歡司命注籍天帝定年隨其宿業受報不差保形守神澄心自然變錬滓滯重修善功以道通神以德育形形神合契歸於虛無不生不死常住獨存人須保養形神愼勿損焉汝道士當須保守形神愛養精氣不損毛髮不損皮膚內全精神外具身形首冠蓮花足履太山中披日月四象分明天地在體日月存身有道可法有德可尊萬物服從一切歸依故謂法服出家法身道言吾過去後上皇半劫當有邪學鬼道不從我教自作一法人民信向天下歸伏損形滅身多積財寶大造形像廣設屋宅妄稱聖果過去得福淫欲姦矯惑亂人心漸漸滋蔓男女敬信永不開悟國破家亡身滅族散繼踵相仍舉世沉迷終無覺察當此之時我法大壞人不肯行唯崇鬼法寂滅之教長生久視而不信用痛哉痛哉道士無知亦復奉也一習此法永無仙分長生之冀可不愼哉何以故為是隂教鬼道死滅之法喻如五穀朽壞有生相不亦如腐壤能生物不亦如死灰更有然不復如枯木得重榮不消散朽壞化為糞土此為寂滅不生法也世以生為善事死是惡事皆欲其生悉悲其死故我為說長生之法令其不死永劫長存但為衆生顚倒不能信奉致有死壞而乃求學死滅之法可不誤哉且死者豈復須學矣故仙道貴全身鬼道貴滅形仙道貴光明鬼道貴幽冥仙道貴長存鬼道貴消亡仙道貴清虛鬼道貴濁辱仙道貴保安鬼道貴浮危仙道貴有身鬼道貴無形有道者長生無為錬神入妙歸於大道形神合契常存不亡是也無身者死滅灰塵形朽神逝沉淪九夜冥冥幽暗是也汝等道士宜志之焉吾故預記令有心者識矣道言吾過去後有諸道士身披法服形似出家而心實凶惡飲食酒肉殺生偷盜邪淫顚倒種種過惡悉能行之專學小道貪求名利攻根伐本背正入邪不信神仙長生真法而求邪學死滅道者千千萬萬吾當遣五天魔王次第誅之道言有諸道士及以女男持經奉戒禮拜燒香布施救貧造諸靈觀抄經鑄像講說開導引接有心吞津咽液存三守一灰心滅想志求真仙不死之法專誠無退者吾遣諸天靈官九地主司教其大法更受真經神丹靈藥仙芝玉英延年變化錬質易神常存之道隨其學業召入仙宫五嶽洞天漸致通靈轉神入妙飛騰諸天此之學者世亦難量仙道隱密人不知矣是諸王等及以眷屬仙真聖衆一時稱善稽首而退太上洞玄靈寶出家因緣經
